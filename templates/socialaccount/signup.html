{% extends 'base_auth.html' %}
{% load static %}

{% block title %}Complete Sign Up - FluEntra{% endblock %}

{% block extra_css %}
<style>
    .signup-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #2C5282 0%, #4299E1 50%, #4FD1C5 100%);
        padding: 20px;
    }
    
    .signup-card {
        background: white;
        border-radius: 16px;
        padding: 48px;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    
    .signup-card h2 {
        margin-bottom: 16px;
        color: #1a202c;
    }
    
    .signup-card p {
        color: #718096;
        margin-bottom: 32px;
    }
    
    .form-group {
        margin-bottom: 20px;
        text-align: left;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #4a5568;
    }
    
    .form-input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 1rem;
        transition: border-color 0.2s;
    }
    
    .form-input:focus {
        outline: none;
        border-color: #4299E1;
    }
    
    .btn-primary {
        width: 100%;
        padding: 14px 24px;
        background: linear-gradient(135deg, #2C5282 0%, #4299E1 50%, #4FD1C5 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        font-size: 1rem;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(66, 153, 225, 0.3);
    }
    
    .back-link {
        display: inline-block;
        margin-top: 24px;
        color: #718096;
        text-decoration: none;
        font-size: 0.9rem;
    }
    
    .back-link:hover {
        color: #4299E1;
    }
</style>
{% endblock %}

{% block content %}
<div class="signup-container">
    <div class="signup-card">
        <h2>Complete Your Sign Up</h2>
        <p>Just a few more details to get started.</p>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Complete Sign Up</button>
        </form>
        
        <a href="{% url 'auth' %}" class="back-link">← Back to login</a>
    </div>
</div>
{% endblock %}
