{% load static %}
<header class="navbar">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <a href="{% url 'index' %}" class="logo">
            <img src="{% static 'images/LOGO.png' %}" alt="FluEntra" style="height: 300px;">
        </a>
        <nav class="nav-links">
            <a href="{% url 'index' %}#features" class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}">Features</a>
            <a href="{% url 'about' %}" class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}">About Us</a>
            <a href="{% url 'pricing' %}" class="nav-link {% if request.resolver_match.url_name == 'pricing' %}active{% endif %}">Pricing</a>
            <a href="{% url 'contact' %}" class="nav-link {% if request.resolver_match.url_name == 'contact' %}active{% endif %}">Contact</a>
        </nav>
        <div class="mobile-menu-btn">
            <i data-lucide="menu"></i>
        </div>
        <div class="auth-btns">
            {% if user.is_authenticated %}
                <a href="{% url 'app' %}" class="btn btn-outline">
                    <i data-lucide="layout-dashboard"></i>
                    Dashboard
                </a>
                <div class="user-menu">
                    <button class="user-menu-btn">
                        <div class="user-avatar">
                            {% if user.first_name %}
                                {{ user.first_name|make_list|first|upper }}
                            {% else %}
                                {{ user.email|make_list|first|upper }}
                            {% endif %}
                        </div>
                        <i data-lucide="chevron-down" style="width: 16px; height: 16px;"></i>
                    </button>
                    <div class="user-dropdown">
                        <div class="user-dropdown-header">
                            <span class="user-name">{{ user.first_name|default:user.email }}</span>
                            <span class="user-email">{{ user.email }}</span>
                        </div>
                        <div class="user-dropdown-divider"></div>
                        <a href="{% url 'app' %}" class="user-dropdown-item">
                            <i data-lucide="layout-dashboard"></i>
                            Dashboard
                        </a>
                        <a href="{% url 'app' %}#settings" class="user-dropdown-item">
                            <i data-lucide="settings"></i>
                            Settings
                        </a>
                        <a href="{% url 'subscription' %}" class="user-dropdown-item">
                            <i data-lucide="credit-card"></i>
                            Subscription
                        </a>
                        <div class="user-dropdown-divider"></div>
                        <a href="{% url 'logout' %}" class="user-dropdown-item user-dropdown-logout">
                            <i data-lucide="log-out"></i>
                            Logout
                        </a>
                    </div>
                </div>
            {% else %}
                <a href="{% url 'auth' %}" class="btn btn-outline">Login</a>
                <a href="{% url 'auth' %}?mode=signup" class="btn btn-primary">Get Started</a>
            {% endif %}
        </div>
    </div>
</header>

<style>
/* Auth Buttons Styling */
.auth-btns {
    display: flex;
    align-items: center;
    gap: 12px;
}

.auth-btns .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
    font-weight: 600;
    border-radius: 8px;
    transition: all 0.2s ease;
    text-decoration: none;
    font-size: 14px;
    gap: 6px;
}

.auth-btns .btn-outline {
    border: 2px solid #2C5282;
    color: #2C5282;
    background: transparent;
}

.auth-btns .btn-outline:hover {
    background: #2C5282;
    color: white;
}

.auth-btns .btn-primary {
    background: linear-gradient(135deg, #2C5282, #4299E1);
    color: white;
    border: none;
}

.auth-btns .btn-primary:hover {
    background: linear-gradient(135deg, #234670, #3182ce);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(44, 82, 130, 0.3);
}

.auth-btns .btn i,
.auth-btns .btn svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
}

/* User Menu Styles */
.user-menu {
    position: relative;
}

.user-menu-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1px solid rgba(45, 82, 130, 0.2);
    border-radius: 50px;
    padding: 6px 12px 6px 6px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.user-menu-btn:hover {
    background: rgba(45, 82, 130, 0.05);
    border-color: rgba(45, 82, 130, 0.3);
}

.user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4299E1, #4FD1C5);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 14px;
}

.user-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 220px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
    border: 1px solid rgba(0, 0, 0, 0.05);
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: all 0.2s ease;
    z-index: 1000;
}

.user-menu:hover .user-dropdown,
.user-menu.active .user-dropdown {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.user-dropdown-header {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.user-name {
    font-weight: 600;
    color: #1a202c;
    font-size: 14px;
}

.user-email {
    font-size: 12px;
    color: #718096;
}

.user-dropdown-divider {
    height: 1px;
    background: #e2e8f0;
    margin: 0;
}

.user-dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    color: #4a5568;
    text-decoration: none;
    font-size: 14px;
    transition: all 0.15s ease;
}

.user-dropdown-item:hover {
    background: #f7fafc;
    color: #2C5282;
}

.user-dropdown-item i {
    width: 18px;
    height: 18px;
    opacity: 0.7;
}

.user-dropdown-logout {
    color: #e53e3e;
}

.user-dropdown-logout:hover {
    background: #fff5f5;
    color: #c53030;
}

/* Responsive adjustments */
@media (max-width: 768px) {
    .user-menu-btn {
        padding: 4px;
        border: none;
    }
    
    .user-menu-btn i[data-lucide="chevron-down"] {
        display: none;
    }
    
    .user-dropdown {
        right: -10px;
    }
}
</style>
